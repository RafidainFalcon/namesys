<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Password History - صفحة السجلات</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 28px; }
    .panel { max-width: 1100px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px; border: 1px solid rgba(0,0,0,0.08); text-align: center; }
    thead th { background: linear-gradient(90deg,#d8ad55,#ffe2a3); color: #120d05; }
    .actions { display:flex; gap:8px; justify-content:flex-end; margin-bottom:12px; }
    .note { color: var(--muted); margin-bottom:8px; }
    @media print { .actions { display:none; } }
  </style>
</head>
<body>
  <main class="panel glass-panel">
    <div style="padding:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px">
        <div>
          <h1>سجل تغييرات كلمات المرور</h1>
          <div class="note">هنا تُعرض آخر تغييرات بيانات الدخول. الصفحة غير مرئية من الواجهة — افتحها بكتابة <strong>/password.html</strong> بجانب الدومين.</div>
        </div>
        <div class="actions">
          <button id="exportBtn" class="primary-btn">تصدير JSON</button>
          <button id="clearBtn" class="danger-btn">مسح السجل</button>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>التوقيت</th>
            <th>اسم المستخدم</th>
            <th>كلمة المرور (مقنعة)</th>
          </tr>
        </thead>
        <tbody id="historyBody">
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const KEY = 'ems_password_history_v1';
    function load() {
      const raw = localStorage.getItem(KEY);
      const data = raw ? JSON.parse(raw) : [];
      const body = document.getElementById('historyBody');
      if (!data.length) {
        body.innerHTML = '<tr><td colspan="3">لا توجد سجلات كلمات مرور.</td></tr>';
        return;
      }
      body.innerHTML = data.map(item => `
        <tr>
          <td>${new Date(item.at).toLocaleString('ar-IQ')}</td>
          <td>${item.username || ''}</td>
          <td>${item.password || ''}</td>
        </tr>
      `).join('');
    }
    document.getElementById('exportBtn').addEventListener('click', ()=>{
      const raw = localStorage.getItem(KEY) || '[]';
      const blob = new Blob([raw], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'password-history-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(url);
    });
    document.getElementById('clearBtn').addEventListener('click', ()=>{
      if (!confirm('سيتم حذف سجل كلمات المرور نهائياً. هل تريد المتابعة؟')) return;
      localStorage.removeItem(KEY);
      load();
      alert('تم مسح السجل');
    });
    load();
  </script>
</body>
</html>
